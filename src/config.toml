# Config file

name = "Tätigkeitsbericht"
version = "1.0.0"

[database]
type = "sqlite"
path = "myapp.db"



[sollstunden]
wochenstunden = [
    { wochentag = 1, stunden = "4:00", name = "Montag" },
    { wochentag = 2, stunden = "4:00", name = "Dienstag" },
    { wochentag = 3, stunden = "4:00", name = "Mittwoch" },
    { wochentag = 4, stunden = "4:00", name = "Donnerstag" },
    { wochentag = 5, stunden = "0:00", name = "Freitag" },
    { wochentag = 6, stunden = "0:00", name = "Samstag" },
    { wochentag = 7, stunden = "0:00", name = "Sonntag" },
]
wochenstunden_regel = 40
wochenstunden_max = 48
wochenstunden_summe = 16

# Zeiteintrag: Spalten in der Tabelle (0–12) nur ausblenden; Daten bleiben im Modell.
# [zeiteintrag_excel_export].cell_spec kann ausgeblendete Indizes weiter verwenden.
[zeiteintrag_tabelle]
ausgeblendete_spalten = []

# Zeiteintrag: Button „Fuer Excel kopieren“ (tab-getrennte Zwischenablage).
#
# cell_spec — Ausgabereihenfolge:
#   - Ganze Zahl 0…12 = Quellspalte im Tabellenmodell (0 Tag, 1 Datum, 2–3 Von/Bis,
#     4–7 Pausen Von/Bis, 8 Geleistet, 9 Soll, 10 Vertrag, 11 Kommentar, 12 Kalendertag als Text z. B. 7.).
#   - "blank" = leere Zelle (z. B. Platzhalter statt Geleistet/Soll).
# include_header — true: erste Zeile mit den gleichen Spaltennamen wie im Modell.
# leading_empty_columns / trailing_empty_columns — zusaetzliche leere Spalten am Rand jeder Zeile.
#
[zeiteintrag_excel_export]
include_header = false
leading_empty_columns = 0
trailing_empty_columns = 0
cell_spec = [ 0, 12, 2, 3, 4, 5, 6, 7, "blank", "blank", 11]

